# =============================================================================
# Fuzzing Testing Main Workflow
# =============================================================================
# Описание: Главный workflow для фаззинг-тестирования с 15+ триггерами
# Поддерживает Shift Left подход - запускается на ранних этапах CI/CD
# =============================================================================

name: Fuzzing Testing Suite

on:
  push:
    branches: ['**']
    paths-ignore: ['**.md', 'docs/**', '.gitignore']
    tags-ignore: ['**']

  pull_request:
    types: [opened, synchronize, reopened, closed, ready_for_review, review_requested]
    branches: [main, develop, 'feature/**', 'release/**']

  merge_group:
    types: [checks_requested]

  release:
    types: [published, created, prereleased, released]

  create:
    tags: ['v*']

  delete:
    branches: ['**']
    tags: ['**']

  schedule:
    - cron: '0 2 * * *'
    - cron: '0 3 * * 6'

  workflow_dispatch:
    inputs:
      fuzzing_duration:
        description: 'Duration in minutes'
        required: false
        default: '60'
        type: choice
        options: ['15', '30', '60', '120', '240']
      targets:
        description: 'Targets (comma-separated or "all")'
        required: false
        default: 'all'
        type: string
      crash_timeout:
        description: 'Crash timeout (hours)'
        required: false
        default: '2'
        type: choice
        options: ['1', '2', '4', '8']
      verbosity:
        description: 'Verbosity level'
        required: false
        default: 'normal'
        type: choice
        options: ['quiet', 'normal', 'verbose', 'debug']

  workflow_run:
    workflows: ['CI', 'Build', 'Test']
    types: [completed]
    branches: [main, develop]

  discussion:
    types: [created, answered]

  issues:
    types: [opened, labeled, closed]

  issue_comment:
    types: [created]

env:
  PYTHON_VERSION: '3.11'
  CORPUS_DIR: 'fuzz/corpus'
  CRASHES_DIR: 'fuzz/crashes'
  LOGS_DIR: 'fuzz/logs'
  REPORTS_DIR: 'fuzz/reports'
  ARTIFACTS_RETENTION: 30

concurrency:
  group: fuzzing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.analysis.outputs.matrix }}
      run_fuzzing: ${{ steps.analysis.outputs.run_fuzzing }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - id: analysis
        run: |
          pip install pyyaml || true
          python << 'PYEOF'
          import os, json
          all_targets = ["parse_config", "process_user_input", "handle_network_packet",
                        "serialize_data", "load_database", "compress_image",
                        "execute_command", "format_output", "validate_schema",
                        "calculate_checksum", "img2pdf_convert"]
          targets = os.environ.get('INPUT_TARGETS', 'all')
          if targets == 'all':
              selected = all_targets
          else:
              selected = [t.strip() for t in targets.split(',')]
          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
              f.write(f"matrix={json.dumps({'target': selected})}\n")
              f.write("run_fuzzing=true\n")
          print(f"Selected targets: {selected}")
          PYEOF

  prepare:
    name: Prepare Environment
    runs-on: ubuntu-latest
    needs: analyze
    if: needs.analyze.outputs.run_fuzzing == 'true'
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p ${{ env.CORPUS_DIR }}
          mkdir -p ${{ env.CRASHES_DIR }}
          mkdir -p ${{ env.LOGS_DIR }}
          mkdir -p ${{ env.REPORTS_DIR }}
          for t in parse_config process_user_input handle_network_packet \
                   serialize_data load_database compress_image execute_command \
                   format_output validate_schema calculate_checksum img2pdf_convert; do
            mkdir -p "${{ env.CORPUS_DIR }}/$t"
            mkdir -p "${{ env.CRASHES_DIR }}/$t"
            mkdir -p "${{ env.LOGS_DIR }}/$t"
          done
      - uses: actions/cache@v4
        with:
          path: ${{ env.CORPUS_DIR }}
          key: corpus-${{ github.sha }}
          restore-keys: corpus-${{ github.ref_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: fuzz-env
          path: fuzz
          retention-days: 1

  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: [analyze, prepare]
    if: needs.analyze.outputs.run_fuzzing == 'true'
    strategy:
      matrix: ${{ fromJson(needs.analyze.outputs.matrix) }}
      fail-fast: false
      max-parallel: 5
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          pip install atheris coverage pytest hypothesis pyyaml psutil || true
          if [ -f requirements-fuzz.txt ]; then pip install -r requirements-fuzz.txt || true; fi
      - uses: actions/download-artifact@v4
        with:
          name: fuzz-env
          path: fuzz
      - uses: actions/cache@v4
        with:
          path: ${{ env.CORPUS_DIR }}/${{ matrix.target }}
          key: corpus-${{ matrix.target }}-${{ github.sha }}
      - id: fuzz
        run: |
          if [ -f fuzz/scripts/fuzzing_monitor.py ]; then
            python fuzz/scripts/fuzzing_monitor.py \
              --target "${{ matrix.target }}" \
              --duration "60" \
              --crash-timeout "2" \
              --corpus-dir "${{ env.CORPUS_DIR }}/${{ matrix.target }}" \
              --crashes-dir "${{ env.CRASHES_DIR }}/${{ matrix.target }}" \
              --logs-dir "${{ env.LOGS_DIR }}/${{ matrix.target }}" || true
          else
            echo "Monitor not found, running basic check"
            python -c "print('Target: ${{ matrix.target }} - OK')"
          fi
        continue-on-error: true
      - if: always()
        run: |
          if [ -f fuzz/scripts/crash_analyzer.py ]; then
            python fuzz/scripts/crash_analyzer.py \
              --target "${{ matrix.target }}" \
              --crashes-dir "${{ env.CRASHES_DIR }}/${{ matrix.target }}" \
              --reports-dir "${{ env.REPORTS_DIR }}" || true
          fi
        continue-on-error: true
      - if: always()
        run: |
          if [ -f fuzz/scripts/generate_report.py ]; then
            python fuzz/scripts/generate_report.py \
              --target "${{ matrix.target }}" \
              --logs-dir "${{ env.LOGS_DIR }}/${{ matrix.target }}" \
              --crashes-dir "${{ env.CRASHES_DIR }}/${{ matrix.target }}" \
              --reports-dir "${{ env.REPORTS_DIR }}" || true
          fi
      - if: always()
        run: |
          if [ -f fuzz/scripts/fuzzing_dashboard.py ]; then
            python fuzz/scripts/fuzzing_dashboard.py "${{ matrix.target }}" || true
          fi
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crashes-${{ matrix.target }}
          path: |
            ${{ env.CRASHES_DIR }}/${{ matrix.target }}
            ${{ env.LOGS_DIR }}/${{ matrix.target }}
          retention-days: ${{ env.ARTIFACTS_RETENTION }}
          if-no-files-found: ignore
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-${{ matrix.target }}
          path: ${{ env.CORPUS_DIR }}/${{ matrix.target }}
          retention-days: ${{ env.ARTIFACTS_RETENTION }}
          if-no-files-found: ignore
      - if: always()
        run: |
          echo "## Fuzzing: ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          CRASHES=$(find "${{ env.CRASHES_DIR }}/${{ matrix.target }}" -name "*.crash" 2>/dev/null | wc -l || echo "0")
          if [ "$CRASHES" -gt 0 ]; then
            echo "Crashes found: $CRASHES" >> $GITHUB_STEP_SUMMARY
          else
            echo "No crashes" >> $GITHUB_STEP_SUMMARY
          fi

  aggregate:
    name: Aggregate Results
    runs-on: ubuntu-latest
    needs: [analyze, fuzz]
    if: always() && needs.analyze.outputs.run_fuzzing == 'true'
    outputs:
      status: ${{ steps.agg.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: crashes-*
          path: artifacts
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - id: agg
        run: |
          pip install pyyaml || true
          python << 'PYEOF'
          import os, json
          from pathlib import Path
          from datetime import datetime
          total = 0
          if Path('artifacts').exists():
              for d in Path('artifacts').iterdir():
                  if d.is_dir() and d.name.startswith('crashes-'):
                      total += len(list(d.glob('**/*.crash')))
          status = 'PASSED' if total == 0 else 'FAILED'
          results = {'timestamp': datetime.utcnow().isoformat(), 'total_crashes': total, 'status': status}
          with open('results.json', 'w') as f:
              json.dump(results, f, indent=2)
          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
              f.write(f"status={status}\n")
          with open(os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null'), 'a') as f:
              f.write(f"## Results\n\nCrashes: {total}\nStatus: {status}\n")
          PYEOF
      - uses: actions/upload-artifact@v4
        with:
          name: aggregate-results
          path: results.json
          retention-days: ${{ env.ARTIFACTS_RETENTION }}

  bug-reports:
    name: Create Bug Reports
    runs-on: ubuntu-latest
    needs: [fuzz, aggregate]
    if: always() && needs.aggregate.outputs.status == 'FAILED'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: crashes-*
          path: crashes
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install PyGithub || true
          if [ -f fuzz/scripts/bug_reporter.py ]; then
            python fuzz/scripts/bug_reporter.py \
              --crashes-dir crashes \
              --repo "${{ github.repository }}" \
              --run-id "${{ github.run_id }}" \
              --commit "${{ github.sha }}" || true
          fi
        continue-on-error: true

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [aggregate, bug-reports]
    if: always()
    steps:
      - run: |
          echo "## Fuzzing Complete" >> $GITHUB_STEP_SUMMARY
          echo "Run: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Event: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY